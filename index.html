<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PDSA Mock Interview Timer</title>
<style>
  :root {
    color-scheme: dark;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    font-family: "Aptos", "Aptos Display", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background-color 0.6s ease;
    background-color: #262b33;
  }

  .screen {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 6vw;
  }

  .test-banner {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    text-align: center;
    font-size: clamp(11px, 1.6vw, 14px);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 700;
    color: #1E1A0A;
    background: #E5C744;
    padding: 6px 0;
  }

  .slot-badge {
    position: absolute;
    top: 24px;
    right: 28px;
    font-size: clamp(12px, 1.6vw, 16px);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.55);
    font-weight: 600;
  }

  .clock {
    position: absolute;
    top: 24px;
    left: 28px;
    font-size: clamp(14px, 2vw, 20px);
    font-variant-numeric: tabular-nums;
    font-weight: 700;
    color: rgba(255, 255, 255, 0.65);
  }

  .icon-logo {
    position: absolute;
    top: 22px;
    left: 50%;
    transform: translateX(-50%);
    height: clamp(36px, 5vw, 56px);
    width: auto;
    display: none;
  }

  .bookend-logo {
    height: clamp(72px, 12vw, 120px);
    width: auto;
    margin-bottom: clamp(14px, 3vw, 26px);
    display: none;
  }

  .brand-footer {
    position: absolute;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    font-size: clamp(10px, 1.4vw, 13px);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    font-weight: 600;
    color: rgba(255, 255, 255, 0.4);
  }

  .phase-name {
    font-family: "Aptos Display", "Aptos", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    font-size: clamp(26px, 6vw, 58px);
    font-weight: 700;
    letter-spacing: 0.01em;
    color: rgba(255, 255, 255, 0.92);
    margin-bottom: clamp(10px, 2vw, 20px);
    max-width: 34ch;
  }

  .timer {
    font-family: "Aptos Display", "Aptos", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    font-size: clamp(80px, 22vw, 240px);
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    line-height: 1;
    color: #ffffff;
    letter-spacing: 0.01em;
  }

  .note {
    margin-top: clamp(14px, 3vw, 28px);
    font-size: clamp(15px, 2.2vw, 22px);
    font-weight: 500;
    color: rgba(255, 255, 255, 0.78);
    max-width: 46ch;
    line-height: 1.4;
  }

  .next-up {
    margin-top: clamp(18px, 3vw, 32px);
    font-size: clamp(13px, 1.8vw, 17px);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-weight: 600;
    color: rgba(255, 255, 255, 0.55);
  }

  .progress-track {
    position: absolute;
    bottom: 0;
    left: 0;
    height: 8px;
    width: 100%;
    background: rgba(0, 0, 0, 0.25);
  }

  .progress-fill {
    height: 100%;
    width: 100%;
    background: rgba(255, 255, 255, 0.85);
    transform-origin: left center;
    transition: transform 0.9s linear;
  }

  @media (prefers-reduced-motion: reduce) {
    body, .progress-fill {
      transition: none;
    }
  }
</style>
</head>

  ];

  const BOOKEND_BG = "#3A2454";

  // ---- Read optional test overrides from the URL, production needs none of these ----
  // Example test link: mock-interview-timer.html?speed=60&cycles=1
  const params = new URLSearchParams(window.location.search);
  const startOverride = params.get("start");
  const cyclesOverride = params.get("cycles");
  const speedParam = params.get("speed");
  const prerollParam = params.get("preroll");

  const ANCHOR_START = startOverride || DEFAULT_ANCHOR_START;
  const NUM_CYCLES = cyclesOverride ? parseInt(cyclesOverride, 10) : DEFAULT_NUM_CYCLES;
  const SPEED = speedParam ? parseFloat(speedParam) : 1;
  const PREROLL = prerollParam ? parseInt(prerollParam, 10) : DEFAULT_TEST_PREROLL;
  const TEST_MODE = SPEED !== 1;

  if (TEST_MODE) {
    document.getElementById("testBanner").style.display = "block";
  }

  const CYCLE_SECONDS = PHASES.reduce((sum, p) => sum + p.seconds, 0);
  const anchorMs = new Date(ANCHOR_START).getTime();
  const endMs = anchorMs + NUM_CYCLES * CYCLE_SECONDS * 1000;
  const loadRealMs = Date.now();
  const simStartMs = TEST_MODE ? anchorMs - PREROLL * 1000 : null;

  const screenEl = document.getElementById("screen");
  const phaseNameEl = document.getElementById("phaseName");
  const timerEl = document.getElementById("timer");
  const noteEl = document.getElementById("note");
  const nextUpEl = document.getElementById("nextUp");
  const slotBadgeEl = document.getElementById("slotBadge");
  const clockEl = document.getElementById("clock");
  const iconLogoEl = document.getElementById("iconLogo");
  const bookendLogoEl = document.getElementById("bookendLogo");
  const brandFooterEl = document.getElementById("brandFooter");
  const progressFillEl = document.getElementById("progressFill");
  const bodyEl = document.body;

  function getEffectiveNow() {
    if (!TEST_MODE) {
      return Date.now();
    }
    const realElapsed = Date.now() - loadRealMs;
    return simStartMs + realElapsed * SPEED;
  }

  function formatClock(ms) {
    const d = new Date(ms);
    return d.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
  }

  function formatCountdown(totalSeconds) {
    const safe = Math.max(totalSeconds, 0);
    const h = Math.floor(safe / 3600);
    const m = Math.floor((safe % 3600) / 60);
    const s = Math.floor(safe % 60);
    if (h > 0) {
      return h + ":" + String(m).padStart(2, "0") + ":" + String(s).padStart(2, "0");
    }
    return String(m).padStart(2, "0") + ":" + String(s).padStart(2, "0");
  }

  function clearExtras() {
    nextUpEl.textContent = "";
    slotBadgeEl.textContent = "";
  }

  function renderNotStarted(now) {
    bodyEl.style.backgroundColor = BOOKEND_BG;
    clockEl.textContent = formatClock(Date.now());
    clockEl.style.color = "rgba(255,255,255,0.65)";
    iconLogoEl.style.display = "none";
    bookendLogoEl.style.display = "block";
    brandFooterEl.style.color = "rgba(255,255,255,0.4)";
    phaseNameEl.style.color = "rgba(255,255,255,0.92)";
    phaseNameEl.textContent = "Thank you for being here";
    timerEl.style.color = "#ffffff";
    timerEl.textContent = formatCountdown((anchorMs - now) / 1000);
    noteEl.style.color = "rgba(255,255,255,0.78)";
    noteEl.textContent = "Interviews begin at " + formatClock(anchorMs) + ".";
    nextUpEl.style.color = "rgba(255,255,255,0.55)";
    nextUpEl.textContent = "Next up, File Review";
    slotBadgeEl.textContent = "";
    progressFillEl.style.transform = "scaleX(0)";
  }

  function renderComplete() {
    bodyEl.style.backgroundColor = BOOKEND_BG;
    clockEl.textContent = formatClock(Date.now());
    clockEl.style.color = "rgba(255,255,255,0.65)";
    iconLogoEl.style.display = "none";
    bookendLogoEl.style.display = "block";
    brandFooterEl.style.color = "rgba(255,255,255,0.4)";
    phaseNameEl.style.color = "rgba(255,255,255,0.92)";
    phaseNameEl.textContent = "All done, thank you";
    timerEl.textContent = "";
    noteEl.style.color = "rgba(255,255,255,0.78)";
    noteEl.textContent = "Every interview slot is complete. Thank you for giving your time and expertise today.";
    nextUpEl.textContent = "";
    slotBadgeEl.textContent = NUM_CYCLES + " of " + NUM_CYCLES + " slots complete";
    slotBadgeEl.style.color = "rgba(255,255,255,0.55)";
    progressFillEl.style.transform = "scaleX(1)";
  }

  function render() {
    const now = getEffectiveNow();

    if (now < anchorMs) {
      renderNotStarted(now);
      return;
    }

    if (now >= endMs) {
      renderComplete();
      return;
    }

    const elapsedSec = Math.floor((now - anchorMs) / 1000);
    const cycleIndex = Math.floor(elapsedSec / CYCLE_SECONDS);
    const cycleElapsed = elapsedSec % CYCLE_SECONDS;

    let acc = 0;
    let currentPhase = PHASES[0];
    let currentIdx = 0;
    let phaseElapsed = 0;

    for (let i = 0; i < PHASES.length; i++) {
      const phase = PHASES[i];
      if (cycleElapsed < acc + phase.seconds) {
        currentPhase = phase;
        currentIdx = i;
        phaseElapsed = cycleElapsed - acc;
        break;
      }
      acc += phase.seconds;
    }

    const remaining = currentPhase.seconds - phaseElapsed;
    const fraction = 1 - phaseElapsed / currentPhase.seconds;
    const isLastPhaseOfCycle = currentIdx === PHASES.length - 1;
    const isLastCycle = cycleIndex === NUM_CYCLES - 1;

    let nextLabel;
    if (isLastPhaseOfCycle && isLastCycle) {
      nextLabel = "Last slot of the day";
    } else if (isLastPhaseOfCycle) {
      nextLabel = "Next up, File Review for slot " + (cycleIndex + 2);
    } else {
      nextLabel = "Next up, " + PHASES[currentIdx + 1].name;
    }

    bodyEl.style.backgroundColor = currentPhase.bg;
    clockEl.textContent = formatClock(Date.now());
    clockEl.style.color = currentPhase.dark ? "rgba(30,26,10,0.65)" : "rgba(255,255,255,0.65)";
    iconLogoEl.style.display = "block";
    bookendLogoEl.style.display = "none";
    brandFooterEl.style.color = currentPhase.dark ? "rgba(30,26,10,0.4)" : "rgba(255,255,255,0.4)";
    phaseNameEl.textContent = currentPhase.name;
    phaseNameEl.style.color = currentPhase.dark ? "rgba(30,26,10,0.92)" : "rgba(255,255,255,0.92)";
    timerEl.textContent = formatCountdown(remaining);
    timerEl.style.color = currentPhase.dark ? "#1E1A0A" : "#ffffff";
    noteEl.textContent = currentPhase.note;
    noteEl.style.color = currentPhase.dark ? "rgba(30,26,10,0.75)" : "rgba(255,255,255,0.78)";
    nextUpEl.textContent = nextLabel;
    nextUpEl.style.color = currentPhase.dark ? "rgba(30,26,10,0.55)" : "rgba(255,255,255,0.55)";
    slotBadgeEl.textContent = "Slot " + (cycleIndex + 1) + " of " + NUM_CYCLES;
    slotBadgeEl.style.color = currentPhase.dark ? "rgba(30,26,10,0.55)" : "rgba(255,255,255,0.55)";
    progressFillEl.style.transform = "scaleX(" + Math.max(fraction, 0) + ")";
    progressFillEl.style.background = currentPhase.dark ? "rgba(30,26,10,0.35)" : "rgba(255,255,255,0.85)";
  }

  render();
  setInterval(render, 1000);
</script>

</body>
</html>
